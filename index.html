<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE PRIVATA • MasterLuca</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Inter',sans-serif;
    background:#000;
    color:#fff;
    height:100vh;
    overflow:hidden;
}

#video-container {
    position:fixed;
    inset:0;
}

#my-cam {
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay {
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
}

.top-bar {
    height:50px;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    font-size:14px;
}

.chat-container {
    margin-top:auto;
    display:flex;
    flex-direction:column;
    max-height:45vh;
}

#chat-messages {
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message { 
    display:flex; 
    gap:10px; 
}

.avatar {
    width:36px;
    height:36px;
    border-radius:50%;
    background:#00f5ff;
    display:flex;
    align-items:center;
    justify-content:center;
}

.message-text {
    background:rgba(255,255,255,0.1);
    padding:10px;
    border-radius:15px;
    max-width:80%;
}

.my-message {
    align-self:flex-end;
    background:#00f5ff;
    color:#000;
    padding:10px;
    border-radius:15px;
    max-width:75%;
}

.input-area {
    display:flex;
    padding:10px;
    background:#111;
    gap:10px;
}

#message-input {
    flex:1;
    padding:10px 15px;
    border:none;
    border-radius:20px;
    outline:none;
}

.send-btn {
    width:42px;
    height:42px;
    background:#00f5ff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<body>

<div id="video-container">
    <video id="my-cam" autoplay muted playsinline></video>
</div>

<div class="overlay">
    <div class="top-bar">
        <span>🔒 LIVE PRIVATA</span>
        <span>MasterLuca • 1:1</span>
    </div>

    <div class="chat-container">
        <div id="chat-messages"></div>

        <div class="input-area">
            <input id="message-input" placeholder="Scrivi..."
            onkeydown="if(event.key==='Enter') sendMessage()">
            <div class="send-btn" onclick="sendMessage()">↑</div>
        </div>
    </div>
</div>

<script>
const messages = [
    "Ciao, benvenuto nella live.",
    "Tutto ok?",
    "Come va la connessione?",
    "Riesci a vedermi bene?",
    "Perfetto 👍",
    "Continuiamo pure."
];

let index = 0;

function addMessage(text, isMine = false) {
    const chat = document.getElementById("chat-messages");
    const div = document.createElement("div");

    if (isMine) {
        div.className = "my-message";
        div.textContent = text;
    } else {
        div.className = "message";
        div.innerHTML = `
            <div class="avatar">👑</div>
            <div class="message-text">${text}</div>
        `;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function autoMessages() {
    if (index >= messages.length) return;

    addMessage(messages[index]);
    index++;

    // Ritardo realistico (10 - 17 secondi)
    setTimeout(autoMessages, 10000 + Math.random() * 7000);
}

function sendMessage() {
    const input = document.getElementById("message-input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, true);
    input.value = "";
}

async function startWebcam() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById("my-cam").srcObject = stream;
    } catch (e) {
        alert("Impossibile attivare la webcam");
    }
}

// Avvio
startWebcam();
autoMessages();
</script>

</body>
</html>
